<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edelweiss Café – Menu</title>
<style>
body { font-family: Arial; background:#0f0f0f; color:#fff; margin:0; padding:0; }
header { text-align:center; padding:20px; }
h1 { color:#f4d47c; font-size:1.8em; margin:0; }
.section { padding:15px; border-bottom:1px solid #333; }
.item { display:flex; justify-content:space-between; padding:5px 0; flex-wrap:wrap; }
.item span { margin:2px 0; }
.price { color:#f4d47c; font-weight:bold; }
.tabs { display:flex; overflow-x:auto; padding:5px 0; margin:10px 0; scrollbar-width:none; -ms-overflow-style:none; }
.tabs::-webkit-scrollbar { display:none; }
.tabs button { flex:0 0 auto; background:#222; color:#fff; border:1px solid #444; padding:6px 10px; margin:0 3px; border-radius:6px; cursor:pointer; font-size:0.9em; white-space:nowrap; }
#logo { width:120px; max-width:30%; cursor:pointer; }

/* Modal admin responsive */
#adminModal {
  display:none;
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  color:#fff;
  padding:15px;
  overflow:auto;
  z-index:1000;
  box-sizing:border-box;
}
#adminModal h2 { color:#f4d47c; text-align:center; font-size:1.5em; }
#adminModal select, #adminModal input, #adminModal button { margin:5px 0; padding:5px; font-size:0.9em; }
#adminTable { width:100%; border-collapse:collapse; margin-top:10px; display:block; overflow-x:auto; }
#adminTable th, #adminTable td { border:1px solid #444; padding:6px; white-space:nowrap; }
#adminTable th { background:#222; color:#f4d47c; }
#closeAdmin { position:absolute; top:10px; right:15px; cursor:pointer; font-size:1.5em; }

#jsonOutput { width:100%; height:250px; margin-top:10px; background:#111; color:#fff; padding:10px; overflow:auto; display:none; white-space:pre-wrap; font-size:0.85em; }
</style>
</head>
<body>

<header>
<img id="logo" src="logo.png" alt="Edelweiss Logo">
<h1>EDELWEISS CAFÉ</h1>
</header>

<div class="tabs">
<button onclick="showSection('coffee')">Καφέδες</button>
<button onclick="showSection('beverages')">Ροφήματα</button>
<button onclick="showSection('juices')">Χυμοί</button>
<button onclick="showSection('smoothies')">Smoothies</button>
<button onclick="showSection('softdrinks')">Αναψυκτικά</button>
<button onclick="showSection('sandwiches')">Σάντουιτς</button>
<button onclick="showSection('breakfast')">Πρωινά</button>
<button onclick="showSection('salads')">Σαλάτες</button>
<button onclick="showSection('fastfood')">Fast Food</button>
<button onclick="showSection('icecream')">Παγωτά</button>
</div>

<!-- Admin Modal -->
<div id="adminModal">
  <span id="closeAdmin">&times;</span>
  <h2>Admin Menu</h2>
  <label>Επιλέξτε ενότητα:</label>
  <select id="sectionSelect"></select>
  <button id="resetSectionBtn">Επαναφορά ενότητας</button>
  <button id="resetAllBtn">Επαναφορά όλου του menu</button>
  <button id="viewJSONBtn">Δες όλο το menu (JSON)</button>
  <table id="adminTable">
    <thead><tr><th>Όνομα</th><th>Τιμή</th><th>Δράσεις</th></tr></thead>
    <tbody></tbody>
  </table>
  <input id="newName" placeholder="Όνομα"> <input id="newPrice" placeholder="Τιμή">
  <button id="addItemBtn">Προσθήκη</button>
  <pre id="jsonOutput"></pre>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
let logoClicks=0;
const logo=document.getElementById('logo');
const adminModal=document.getElementById('adminModal');
const sectionSelect=document.getElementById('sectionSelect');
const adminTableBody=document.querySelector('#adminTable tbody');
const addItemBtn=document.getElementById('addItemBtn');
const newNameInput=document.getElementById('newName');
const newPriceInput=document.getElementById('newPrice');
const resetBtn=document.getElementById('resetSectionBtn');
const resetAllBtn=document.getElementById('resetAllBtn');
const viewJSONBtn=document.getElementById('viewJSONBtn');
const jsonOutput=document.getElementById('jsonOutput');

const defaultMenuData={
coffee:[{name:"Ελληνικός", price:"—"},{name:"Ελληνικός Διπλός", price:"—"}],
beverages:[{name:"Σοκολάτα Ζεστή", price:"—"}],
juices:[{name:"Φρέσκος χυμός πορτοκάλι", price:"—"}],
smoothies:[{name:"Strawberry Split", price:"—"}],
softdrinks:[{name:"Coca Cola", price:"—"}],
sandwiches:[{name:"Μπαγκέτα απλή", price:"3.00€"},{name:"Μπαγκέτα κοτόπουλο", price:"4.00€"},{name:"Toast", price:"2.50€"}],
breakfast:[{name:"Κροκ Μαντάμ", price:"8.00€"},{name:"Αγγλικό", price:"13.00€"},{name:"Ελληνικό", price:"10.00€"},{name:"Ομελέτα", price:"6.00€"}],
salads:[{name:"Χωριάτικη", price:"8.00€"},{name:"Ντάκος", price:"8.00€"},{name:"Σίζαρ", price:"8.00€"}],
fastfood:[{name:"Burger", price:"8.00€"},{name:"Chicken nuggets", price:"8.50€"},{name:"Club Sandwich", price:"7.00€"},{name:"Edelweiss Hot Dog", price:"7.00€"},{name:"Pizza Margherita 26cm", price:"8.00€"},{name:"Pizza Margherita 30cm", price:"10.00€"},{name:"Vegetarian Tortillas", price:"4.00€"},{name:"Chicken Tortillas", price:"4.50€"}],
icecream:Array.from({length:10},(_,i)=>({name:"Γεύση "+(i+1), price:"—"}))
};

let menuData=JSON.parse(localStorage.getItem('menuData'))||JSON.parse(JSON.stringify(defaultMenuData));
function saveData(){localStorage.setItem('menuData',JSON.stringify(menuData));}

logo.addEventListener('click',()=>{
logoClicks++;
if(logoClicks>=5){logoClicks=0;
const code=prompt("Εισάγετε τον κωδικό admin:");
if(code==="1234"){adminModal.style.display='block';populateSectionSelect();renderAdmin();} else alert("Λανθασμένος κωδικός!");}
});

document.getElementById('closeAdmin').addEventListener('click',()=>{adminModal.style.display='none';jsonOutput.style.display='none';});

function populateSectionSelect(){sectionSelect.innerHTML='';Object.keys(menuData).forEach(sec=>{const opt=document.createElement('option');opt.value=sec;opt.text=sec.toUpperCase();sectionSelect.appendChild(opt);});}
function renderAdmin(){const sec=sectionSelect.value;adminTableBody.innerHTML='';menuData[sec].forEach((item,i)=>{const row=document.createElement('tr');row.innerHTML=`<td contenteditable="true" oninput="updateItem('${sec}',${i},'name',this.innerText)">${item.name}</td><td contenteditable="true" oninput="updateItem('${sec}',${i},'price',this.innerText)">${item.price}</td><td><button onclick="deleteItem('${sec}',${i})">Διαγραφή</button></td>`;adminTableBody.appendChild(row);});}

sectionSelect.addEventListener('change', renderAdmin);
window.updateItem=function(sec,i,key,value){menuData[sec][i][key]=value;saveData();}
window.deleteItem=function(sec,i){menuData[sec].splice(i,1);saveData();renderAdmin();}
addItemBtn.addEventListener('click',()=>{const sec=sectionSelect.value;const name=newNameInput.value.trim();const price=newPriceInput.value.trim();if(name){menuData[sec].push({name,price});saveData();newNameInput.value='';newPriceInput.value='';renderAdmin();}});
resetBtn.addEventListener('click',()=>{const sec=sectionSelect.value;menuData[sec]=JSON.parse(JSON.stringify(defaultMenuData[sec]));saveData();renderAdmin();alert(`Η ενότητα ${sec.toUpperCase()} επαναφέρθηκε.`);});
resetAllBtn.addEventListener('click',()=>{menuData=JSON.parse(JSON.stringify(defaultMenuData));saveData();renderAdmin();alert("Όλο το menu επαναφέρθηκε στην αρχική του μορφή.");});
viewJSONBtn.addEventListener('click',()=>{jsonOutput.textContent=JSON.stringify(menuData,null,2);jsonOutput.style.display='block';});

window.showSection=function(id){document.querySelectorAll('.section').forEach(s=>s.style.display='none');let sec=document.getElementById(id);if(!sec){sec=document.createElement('div');sec.className='section';sec.id=id;document.body.appendChild(sec);}
sec.innerHTML=`<h2>${id.toUpperCase()}</h2>`+menuData[id].map(item=>`<div class="item"><span>${item.name}</span><span class="price">${item.price}</span></div>`).join('');sec.style.display='block';}

showSection('coffee');
</script>
</body>
</html>
